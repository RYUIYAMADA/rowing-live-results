<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ボート競技 速報サイト</title>

<!-- OGPメタタグ -->
<meta property="og:title" content="ボート競技 速報サイト">
<meta property="og:description" content="レース結果をリアルタイム更新">
<meta property="og:type" content="website">
<meta name="theme-color" content="#1a3a5c">

<!-- favicon（外部ファイル不要のbase64 SVG） -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚣</text></svg>">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="notion-cover">
  <div class="notion-cover-text">🚣 ボート競技速報サイト</div>
</div>

<div class="notion-page">

  <h1 class="page-title" id="tournament-name">読み込み中...</h1>
  <div class="page-meta" id="tournament-meta"></div>

  <!-- YouTube Live 埋め込み（youtube_url が設定されている場合のみ表示） -->
  <div id="youtube-container"></div>

  <!-- ローディング・エラー表示 -->
  <div id="loading" class="loading">
    <span class="loading-spinner"></span>データを読み込んでいます...
  </div>
  <div id="error-message" style="display:none; padding:16px; background:#ffe0e0; color:#e03e3e; border-radius:6px; margin-bottom:16px;"></div>

  <!-- ビュー切替タブ -->
  <div class="view-tabs">
    <div class="view-tab active" onclick="switchView('toggle', this)">🏁 種目別（トグル）</div>
    <div class="view-tab" onclick="switchView('table', this)">📊 全レース一覧</div>
  </div>

  <!-- ================================================================ -->
  <!--                     VIEW 1: 種目別トグル表示                       -->
  <!-- ================================================================ -->
  <div class="view-content active" id="view-toggle">

    <!-- フィルタバー -->
    <div class="filter-bar">
      <label>フィルタ:</label>
      <select class="filter-select" id="filter-cat" onchange="applyFilters()">
        <option value="all">カテゴリ: すべて</option>
        <option value="M">👨 男子</option>
        <option value="W">👩 女子</option>
        <option value="X">🤝 混成</option>
      </select>
      <select class="filter-select" id="filter-round" onchange="applyFilters()">
        <option value="all">ラウンド: すべて</option>
        <option value="FA">決勝A</option>
        <option value="FB">決勝B</option>
        <option value="SF">準決勝</option>
        <option value="H">予選</option>
        <option value="RK">順位決定</option>
        <option value="R">敗者復活</option>
      </select>
      <select class="filter-select" id="filter-day" onchange="applyFilters()">
        <option value="all">日程: すべて</option>
        <!-- 日程オプションはJS側で動的生成 -->
      </select>
      <!-- 状態フィルタ（結果あり/未実施） -->
      <select class="filter-select" id="filter-status" onchange="applyFilters()">
        <option value="all">状態: すべて</option>
        <option value="done">結果あり</option>
        <option value="upcoming">未実施</option>
      </select>
      <input type="text" class="filter-search" id="filter-crew"
        placeholder="🔍 所属・クルー名で検索" oninput="applyFilters()">
      <button class="filter-reset" onclick="resetFilters()">✕ リセット</button>
      <span class="filter-count" id="filter-count">-</span>
    </div>

    <!-- トグル一覧（JS側で動的生成） -->
    <div id="view-toggle-content"></div>

  </div>

  <!-- ================================================================ -->
  <!--                   VIEW 2: 全レース一覧テーブル                      -->
  <!-- ================================================================ -->
  <div class="view-content" id="view-table">

    <div class="filter-bar">
      <span class="filter-count" id="db-count">-</span>
    </div>

    <div class="db-table-wrapper">
      <table class="db-table">
        <thead>
          <tr>
            <!-- ソート対応列にdata-col属性を付与 -->
            <th data-col="race_no" onclick="sortDbTable(this)">Race No.<span class="sort-icon"></span></th>
            <th>種目コード</th>
            <th>種目名</th>
            <th>年齢区分</th>
            <th>ラウンド</th>
            <th>日程</th>
            <th>時刻</th>
            <th>順位</th>
            <th>B</th>
            <th>クルー名</th>
            <th>所属</th>
            <th>500m</th>
            <th data-col="finish" onclick="sortDbTable(this)">フィニッシュ<span class="sort-icon"></span></th>
            <th>備考</th>
          </tr>
        </thead>
        <tbody id="db-table-body">
          <!-- JS側で動的生成 -->
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- ステータスバー -->
<div class="update-bar">
  <div>
    <span class="live-dot"></span>LIVE |
    最終更新 <span id="last-updated">-</span>
    <!-- 手動更新ボタン -->
    <button class="refresh-btn" id="refresh-btn" onclick="manualRefresh()">🔄 今すぐ更新</button>
  </div>
  <div id="status-summary">-</div>
</div>

<!-- トースト通知コンテナ -->
<div id="toast-container"></div>

<script src="js/app.js"></script>
</body>
</html>
